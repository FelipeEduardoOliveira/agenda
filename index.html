<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Evelyn Vitoria · Agenda</title>
<style>
  /* =====================================================
     DESIGN TOKENS — Studio Evelyn Vitoria
     Paleta: Rosa Premium, Grafite, Branco
  ===================================================== */
  :root {
    --white:        #FFFFFF;
    --off-white:    #FFF5FA;
    --cream:        #FFF0F8;
    --nude:         #DEC6CA;
    --nude-dark:    #D82C8C;
    --rose-gold:    #D82C8C;
    --rose-light:   #FDE8F5;
    --gold:         #D82C8C;
    --gold-light:   #F976CF;
    --gold-dark:    #593950;
    --brown-text:   #130617;
    --text-dark:    #130617;
    --text-mid:     #593950;
    --text-light:   #593950;
    --text-muted:   #9E7A8E;
    --border:       #F2D6E8;
    --border-light: #FAE8F5;
    --shadow-sm:    0 2px 8px rgba(216,44,140,.08);
    --shadow-md:    0 4px 20px rgba(216,44,140,.12);
    --shadow-lg:    0 8px 40px rgba(216,44,140,.16);
    --radius-sm:    8px;
    --radius-md:    14px;
    --radius-lg:    22px;
    --radius-xl:    30px;
    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body:    'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    --sidebar-w:    260px;
    --header-h:     64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--off-white);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* =====================================================
     SCROLLBAR
  ===================================================== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--nude-dark); border-radius: 3px; }

  /* =====================================================
     LAYOUT
  ===================================================== */
  .app-layout {
    display: flex;
    min-height: 100vh;
  }

  /* =====================================================
     SIDEBAR
  ===================================================== */
  .sidebar {
    width: var(--sidebar-w);
    background: linear-gradient(175deg, #130617 0%, #2D0B2A 40%, #593950 100%);
    color: var(--white);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform .3s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,.2);
  }

  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }

  .logo-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold-light);
    font-style: italic;
  }

  .logo-sub {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,.4);
    margin-top: 3px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 0;
    overflow-y: auto;
  }

  .nav-section-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,.3);
    padding: 12px 24px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 24px;
    cursor: pointer;
    transition: all .2s;
    border-left: 3px solid transparent;
    font-size: 14px;
    color: rgba(255,255,255,.7);
    user-select: none;
  }

  .nav-item:hover {
    background: rgba(255,255,255,.06);
    color: var(--gold-light);
  }

  .nav-item.active {
    background: rgba(216,44,140,.18);
    border-left-color: var(--rose-gold);
    color: var(--gold-light);
    font-weight: 600;
  }

  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 20px 24px;
    border-top: 1px solid rgba(255,255,255,.1);
    font-size: 11px;
    color: rgba(255,255,255,.3);
    text-align: center;
  }

  /* =====================================================
     MAIN CONTENT
  ===================================================== */
  .main-content {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    height: var(--header-h);
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow-sm);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .menu-toggle {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: var(--text-mid);
    padding: 4px;
  }

  .page-title {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--brown-text);
    font-style: italic;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  .btn-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--off-white);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .2s;
    color: var(--text-mid);
  }

  .btn-icon:hover {
    background: var(--nude);
    border-color: var(--nude-dark);
    color: var(--rose-gold);
  }

  .page-body {
    flex: 1;
    padding: 28px;
    overflow-y: auto;
  }

  /* =====================================================
     BUTTONS
  ===================================================== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    font-family: var(--font-body);
    letter-spacing: .3px;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, #D82C8C, #F976CF);
    color: var(--white);
    box-shadow: 0 2px 12px rgba(216,44,140,.4);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 18px rgba(216,44,140,.5);
  }

  .btn-secondary {
    background: var(--white);
    color: var(--rose-gold);
    border: 1.5px solid var(--rose-gold);
  }

  .btn-secondary:hover {
    background: var(--rose-light);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-mid);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--cream);
  }

  .btn-danger {
    background: #F5E8E8;
    color: #C05050;
    border: 1px solid #E8C4C4;
  }

  .btn-danger:hover { background: #EDD8D8; }

  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-lg { padding: 13px 28px; font-size: 14px; }

  /* =====================================================
     CARDS
  ===================================================== */
  .card {
    background: var(--white);
    border-radius: var(--radius-md);
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    padding: 22px;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 15px;
    color: var(--brown-text);
    font-style: italic;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* =====================================================
     DASHBOARD CARDS
  ===================================================== */
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--white);
    border-radius: var(--radius-md);
    padding: 22px;
    border: 1px solid var(--border-light);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #D82C8C, #F976CF);
  }

  .stat-card .stat-icon {
    width: 42px; height: 42px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, #FDE8F5, #F976CF);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 14px;
  }

  .stat-card .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--brown-text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card .stat-label {
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: .3px;
  }

  /* =====================================================
     AGENDA VIEWS
  ===================================================== */
  .view-tabs {
    display: flex;
    gap: 4px;
    background: var(--cream);
    padding: 4px;
    border-radius: var(--radius-sm);
    margin-bottom: 22px;
    width: fit-content;
  }

  .view-tab {
    padding: 8px 18px;
    border-radius: calc(var(--radius-sm) - 2px);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    color: var(--text-mid);
    border: none;
    background: transparent;
    font-family: var(--font-body);
  }

  .view-tab.active {
    background: var(--white);
    color: var(--rose-gold);
    font-weight: 600;
    box-shadow: var(--shadow-sm);
  }

  /* DAILY VIEW */
  .daily-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .day-nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .day-nav-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .2s;
    color: var(--text-mid);
  }

  .day-nav-btn:hover { background: var(--cream); color: var(--rose-gold); }

  .day-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--brown-text);
    min-width: 180px;
    text-align: center;
    font-family: var(--font-display);
    font-style: italic;
  }

  .time-slots-list { display: flex; flex-direction: column; gap: 10px; }

  .time-slot {
    display: flex;
    align-items: stretch;
    gap: 0;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border-light);
    transition: all .2s;
    min-height: 72px;
  }

  .time-slot:hover { box-shadow: var(--shadow-sm); }

  .slot-time {
    width: 72px;
    min-width: 72px;
    background: linear-gradient(160deg, var(--cream), var(--nude));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--rose-gold);
    letter-spacing: .5px;
  }

  .slot-content {
    flex: 1;
    padding: 14px 18px;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .slot-free .slot-time { background: linear-gradient(160deg, #F5FAF0, #E8F5E0); }
  .slot-free .slot-content { background: #FAFDF7; }
  .slot-free .slot-time { color: #7AAA60; }

  .slot-blocked .slot-time { background: linear-gradient(160deg, #F5F0F0, #F0E8E8); }
  .slot-blocked .slot-content { background: #FDF8F8; }
  .slot-blocked .slot-time { color: #C07070; }

  .slot-free-label { font-size: 13px; color: var(--text-muted); font-style: italic; }
  .slot-client-name { font-size: 15px; font-weight: 600; color: var(--brown-text); }
  .slot-client-info { font-size: 12px; color: var(--text-light); margin-top: 3px; }
  .slot-blocked-label { font-size: 13px; color: #C07070; font-weight: 500; }
  .slot-blocked-reason { font-size: 12px; color: #B08080; margin-top: 3px; }

  .slot-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* WEEKLY VIEW */
  .weekly-grid {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .wg-header, .wg-time-header {
    background: linear-gradient(160deg, #130617, #593950);
    color: var(--white);
    padding: 12px 6px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
  }

  .wg-time-header { background: #593950; }

  .wg-header .wg-day { font-size: 10px; opacity: .7; text-transform: uppercase; letter-spacing: 1px; }
  .wg-header .wg-date { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .wg-header.today { background: linear-gradient(160deg, #D82C8C, #F976CF); }

  .wg-time-cell {
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--rose-gold);
    min-height: 56px;
  }

  .wg-cell {
    background: var(--white);
    min-height: 56px;
    padding: 4px;
    cursor: pointer;
    transition: background .15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wg-cell:hover { background: var(--cream); }
  .wg-cell.occupied { background: #FDE8F5; cursor: default; }
  .wg-cell.blocked { background: #F5EEEE; cursor: default; }
  .wg-cell.today-col { background: #FFF5FA; }
  .wg-cell.today-col:hover { background: #FFF0F8; }

  .wg-appt {
    background: linear-gradient(135deg, #D82C8C, #F976CF);
    color: var(--white);
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 10px;
    font-weight: 600;
    width: 100%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .wg-block {
    background: #E8D0D0;
    color: #905050;
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 10px;
    font-weight: 600;
    width: 100%;
    text-align: center;
  }

  /* MONTHLY VIEW */
  .monthly-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .mg-day-header {
    background: linear-gradient(160deg, #130617, #593950);
    color: var(--white);
    text-align: center;
    padding: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .mg-cell {
    background: var(--white);
    min-height: 80px;
    padding: 6px;
    cursor: pointer;
    transition: background .15s;
    vertical-align: top;
  }

  .mg-cell:hover { background: var(--cream); }
  .mg-cell.other-month { background: var(--off-white); }
  .mg-cell.other-month .mg-day-num { color: var(--text-muted); }
  .mg-cell.today { background: #FFF5FA; border: 2px solid #D82C8C; }

  .mg-day-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--brown-text);
    margin-bottom: 4px;
  }

  .mg-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rose-gold);
    margin: 1px;
  }

  .mg-dot.blocked { background: #C07070; }
  .mg-dot.free { background: #7AAA60; }

  /* =====================================================
     CLIENTS TABLE
  ===================================================== */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .input-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .input-wrap .input-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  .input, textarea, select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-dark);
    background: var(--white);
    transition: border-color .2s, box-shadow .2s;
    font-family: var(--font-body);
    outline: none;
  }

  .input:focus, textarea:focus, select:focus {
    border-color: var(--rose-gold);
    box-shadow: 0 0 0 3px rgba(216,44,140,.12);
  }

  .input-wrap .input { padding-left: 36px; }

  textarea { resize: vertical; min-height: 80px; }

  .data-table { width: 100%; border-collapse: collapse; }

  .data-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
    border-bottom: 2px solid var(--border);
    font-weight: 600;
  }

  .data-table td {
    padding: 13px 14px;
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
    vertical-align: middle;
  }

  .data-table tr:last-child td { border-bottom: none; }
  .data-table tbody tr { transition: background .15s; }
  .data-table tbody tr:hover { background: var(--off-white); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .3px;
  }

  .badge-rose { background: var(--rose-light); color: var(--rose-gold); }
  .badge-gold { background: var(--gold-light); color: var(--gold-dark); }
  .badge-green { background: #E5F5E0; color: #5A9040; }
  .badge-red { background: #F5E5E5; color: #C05050; }
  .badge-gray { background: var(--cream); color: var(--text-mid); }

  /* WhatsApp indicator */
  .wa-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; }
  .wa-dot { width: 7px; height: 7px; border-radius: 50%; }
  .wa-dot.sent { background: #25D366; }
  .wa-dot.scheduled { background: #F976CF; }
  .wa-dot.pending { background: var(--text-muted); }

  /* =====================================================
     MODAL
  ===================================================== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(19,6,23,.55);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px) scale(.97);
    transition: transform .25s;
  }

  .modal-overlay.open .modal { transform: none; }

  .modal-header {
    padding: 24px 28px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--brown-text);
    font-style: italic;
  }

  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--off-white);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mid);
    transition: all .2s;
    flex-shrink: 0;
  }

  .modal-close:hover { background: var(--cream); color: var(--rose-gold); }

  .modal-body { padding: 0 28px 24px; }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 6px;
    letter-spacing: .3px;
    text-transform: uppercase;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .modal-footer {
    padding: 0 28px 24px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    border-top: 1px solid var(--border-light);
    padding-top: 20px;
  }

  /* =====================================================
     TOAST
  ===================================================== */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }

  .toast {
    background: var(--white);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    max-width: 340px;
    border-left: 4px solid #D82C8C;
    animation: toastIn .3s ease;
    pointer-events: all;
  }

  .toast.success { border-left-color: #5A9040; }
  .toast.error { border-left-color: #C05050; }
  .toast.warning { border-left-color: #F976CF; }

<!-- ===================================================
     JAVASCRIPT APPLICATION
=================================================== -->
<script>
'use strict';

/* =====================================================
   STATE — estado global da aplicação
===================================================== */
const State = {
  currentPage: 'dashboard',
  agendaView: 'daily',       // daily | weekly | monthly
  currentDate: new Date(),   // data navegação agenda diária
  weekDate: new Date(),      // data navegação semanal
  monthDate: new Date(),     // data navegação mensal
};

/* =====================================================
   STORAGE — persistência LocalStorage
===================================================== */
const Storage = {
  KEYS: {
    clients:      'lumiere_clients',
    appointments: 'lumiere_appointments',
    waitlist:     'lumiere_waitlist',
    blocks:       'lumiere_blocks',
  },

  get(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  },

  set(key, data) {
    localStorage.setItem(key, JSON.stringify(data));
  },

  getClients()      { return this.get(this.KEYS.clients); },
  setClients(d)     { this.set(this.KEYS.clients, d); },
  getAppointments() { return this.get(this.KEYS.appointments); },
  setAppointments(d){ this.set(this.KEYS.appointments, d); },
  getWaitlist()     { return this.get(this.KEYS.waitlist); },
  setWaitlist(d)    { this.set(this.KEYS.waitlist, d); },
  getBlocks()       { return this.get(this.KEYS.blocks); },
  setBlocks(d)      { this.set(this.KEYS.blocks, d); },
};

/* =====================================================
   UTILS — funções utilitárias
===================================================== */
const Utils = {
  uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  },

  fmtDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  },

  fmtDateLong(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
  },

  toDateStr(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2,'0');
    const d = String(date.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  },

  todayStr() {
    return this.toDateStr(new Date());
  },

  addDays(date, n) {
    const d = new Date(date);
    d.setDate(d.getDate() + n);
    return d;
  },

  startOfWeek(date) {
    const d = new Date(date);
    const day = d.getDay(); // 0=dom
    const diff = d.getDate() - day + (day === 0 ? -6 : 1); // começa na segunda
    d.setDate(diff);
    return d;
  },

  escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  },

  TIME_SLOTS: ['06:00','09:00','12:00','15:00','18:00'],

  WEEK_DAYS_SHORT: ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],
  WEEK_DAYS_FULL:  ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'],
  MONTHS: ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],
};

/* =====================================================
   WHATSAPP SERVICE — estrutura para futura integração
===================================================== */
const WhatsAppService = {
  // Envia lembrete de agendamento (simulado)
  sendReminder(appointment, client) {
    console.log('[WhatsAppService] sendReminder:', { appointment, client });
    // TODO: integrar com API WhatsApp Business
    // Atualiza status do lembrete
    const appointments = Storage.getAppointments();
    const idx = appointments.findIndex(a => a.id === appointment.id);
    if (idx !== -1) {
      appointments[idx].waStatus = 'sent';
      appointments[idx].waSentAt = new Date().toISOString();
      Storage.setAppointments(appointments);
    }
    return { success: true, simulated: true };
  },

  // Agenda lembrete para 30min antes (simulado)
  scheduleReminder(appointment, client) {
    console.log('[WhatsAppService] scheduleReminder:', { appointment, client });
    // TODO: integrar com scheduler/cron real
    const appointments = Storage.getAppointments();
    const idx = appointments.findIndex(a => a.id === appointment.id);
    if (idx !== -1) {
      appointments[idx].waStatus = 'scheduled';
      Storage.setAppointments(appointments);
    }
    return { success: true, simulated: true };
  },

  statusLabel(status) {
    const map = {
      sent:      { dot: 'sent',      label: 'Enviado' },
      scheduled: { dot: 'scheduled', label: 'Programado' },
      pending:   { dot: 'pending',   label: 'Pendente' },
    };
    return map[status] || map.pending;
  },

  renderBadge(status) {
    const s = this.statusLabel(status);
    return `<span class="wa-badge"><span class="wa-dot ${s.dot}"></span>${s.label}</span>`;
  }
};

/* =====================================================
   AGENDA — lógica de agendamentos
===================================================== */
const Agenda = {
  getForDate(dateStr) {
    return Storage.getAppointments().filter(a => a.date === dateStr && !a.cancelled);
  },

  isSlotOccupied(dateStr, time, excludeId = null) {
    return Storage.getAppointments().some(a =>
      a.date === dateStr && a.time === time && !a.cancelled && a.id !== excludeId
    );
  },

  isSlotBlocked(dateStr, time) {
    const blocks = Storage.getBlocks();
    return blocks.some(b => {
      if (b.fullDay && b.date === dateStr) return true;
      if (b.dateStart && b.dateEnd) {
        // bloqueio de período
        if (dateStr >= b.dateStart && dateStr <= b.dateEnd) return true;
      }
      if (b.date === dateStr && b.time && b.time === time) return true;
      return false;
    });
  },

  getBlockForSlot(dateStr, time) {
    return Storage.getBlocks().find(b => {
      if (b.fullDay && b.date === dateStr) return true;
      if (b.dateStart && b.dateEnd && dateStr >= b.dateStart && dateStr <= b.dateEnd) return true;
      if (b.date === dateStr && b.time === time) return true;
      return false;
    });
  },

  getDayStats(dateStr) {
    const appts   = this.getForDate(dateStr);
    const blocked = Utils.TIME_SLOTS.filter(t => this.isSlotBlocked(dateStr, t)).length;
    const occupied = appts.length;
    const free    = Utils.TIME_SLOTS.length - occupied - blocked;
    return { total: Utils.TIME_SLOTS.length, occupied, blocked, free: Math.max(0, free) };
  },

  countWeek() {
    let count = 0;
    const now = new Date();
    const mon = Utils.startOfWeek(now);
    for (let i = 0; i < 7; i++) {
      const d = Utils.toDateStr(Utils.addDays(mon, i));
      count += this.getForDate(d).length;
    }
    return count;
  },

  countMonth() {
    const now = new Date();
    const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    return Storage.getAppointments().filter(a => a.date.startsWith(prefix) && !a.cancelled).length;
  },

  nextToday() {
    const today = Utils.todayStr();
    const now = new Date();
    const currentHour = now.getHours() * 60 + now.getMinutes();
    const appts = this.getForDate(today)
      .filter(a => {
        const [h, m] = a.time.split(':').map(Number);
        return h * 60 + m >= currentHour;
      })
      .sort((a, b) => a.time.localeCompare(b.time));
    return appts[0] || null;
  }
};

/* =====================================================
   TOAST — notificações
===================================================== */
const Toast = {
  show(type, title, msg, duration = 3500) {
    const icons = { success: '✓', error: '✕', warning: '⚠', info: '✦' };
    const id = Utils.uid();
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.id = `toast-${id}`;
    el.innerHTML = `
      <div class="toast-icon">${icons[type] || '✦'}</div>
      <div>
        <div class="toast-title">${Utils.escHtml(title)}</div>
        ${msg ? `<div class="toast-msg">${Utils.escHtml(msg)}</div>` : ''}
      </div>
    `;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(20px)';
      el.style.transition = '.3s';
      setTimeout(() => el.remove(), 300);
    }, duration);
  },

  success(title, msg) { this.show('success', title, msg); },
  error(title, msg)   { this.show('error', title, msg); },
  warning(title, msg) { this.show('warning', title, msg); },
  info(title, msg)    { this.show('info', title, msg); },
};

/* =====================================================
   MODAL SYSTEM — sistema de modais
===================================================== */
const Modal = {
  current: null,

  open(html, id = 'modal-main') {
    const container = document.getElementById('modalsContainer');
    // Remove existing with same id
    const existing = document.getElementById(`overlay-${id}`);
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = `overlay-${id}`;
    overlay.innerHTML = `<div class="modal">${html}</div>`;
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) this.close(id);
    });
    container.appendChild(overlay);
    requestAnimationFrame(() => overlay.classList.add('open'));
    this.current = id;
  },

  close(id = 'modal-main') {
    const overlay = document.getElementById(`overlay-${id}`);
    if (!overlay) return;
    overlay.classList.remove('open');
    setTimeout(() => overlay.remove(), 250);
  },

  confirm(title, msg, onConfirm) {
    const id = 'modal-confirm';
    const html = `
      <div class="modal-body" style="padding:32px 28px;text-align:center;">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-title">${Utils.escHtml(title)}</div>
        <div class="confirm-msg">${Utils.escHtml(msg)}</div>
      </div>
      <div class="modal-footer" style="justify-content:center;gap:14px;border-top:1px solid var(--border-light);padding:0 28px 24px;padding-top:16px;">
        <button class="btn btn-ghost" onclick="Modal.close('${id}')">Cancelar</button>
        <button class="btn btn-danger" id="confirm-ok">Confirmar</button>
      </div>
    `;
    this.open(html, id);
    setTimeout(() => {
      const btn = document.getElementById('confirm-ok');
      if (btn) btn.onclick = () => { this.close(id); onConfirm(); };
    }, 50);
  }
};

/* =====================================================
   NAVIGATION — roteamento
===================================================== */
function navigate(page) {
  State.currentPage = page;
  // Atualiza nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.id === `nav-${page}`);
  });

  const titles = {
    dashboard: 'Dashboard',
    agenda:    'Agenda',
    bloqueios: 'Bloqueios de Agenda',
    clientes:  'Clientes',
    espera:    'Lista de Espera',
  };

  document.getElementById('pageTitle').textContent = titles[page] || page;
  renderPage(page);
  closeSidebar();
}

function renderPage(page) {
  const body = document.getElementById('pageBody');
  switch (page) {
    case 'dashboard': body.innerHTML = renderDashboard(); break;
    case 'agenda':    body.innerHTML = renderAgenda(); bindAgendaEvents(); break;
    case 'bloqueios': body.innerHTML = renderBloqueios(); break;
    case 'clientes':  body.innerHTML = renderClientes(); break;
    case 'espera':    body.innerHTML = renderEspera(); break;
  }
  updateWaitBadge();
}

/* =====================================================
   SIDEBAR TOGGLE (mobile)
===================================================== */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

/* =====================================================
   UPDATE WAIT BADGE
===================================================== */
function updateWaitBadge() {
  const badge = document.getElementById('wait-badge');
  const count = Storage.getWaitlist().length;
  badge.textContent = count > 0 ? count : '';
}

/* =====================================================
   RENDER DASHBOARD
===================================================== */
function renderDashboard() {
  const today = Utils.todayStr();
  const stats = Agenda.getDayStats(today);
  const appts = Agenda.getForDate(today);
  const next  = Agenda.nextToday();
  const waitCount = Storage.getWaitlist().length;
  const clients = Storage.getClients();

  let nextCard = '';
  if (next) {
    const client = clients.find(c => c.id === next.clientId);
    nextCard = `
      <div class="next-appt-card">
        <div class="next-appt-label">✦ Próximo atendimento de hoje</div>
        <div class="next-appt-name">${Utils.escHtml(client ? client.name : 'Cliente')}</div>
        <div class="next-appt-detail">
          <span>🕐 ${next.time}</span>
          <span>📱 ${Utils.escHtml(client ? client.whatsapp : '')}</span>
          ${next.obs ? `<span>📝 ${Utils.escHtml(next.obs)}</span>` : ''}
        </div>
      </div>
    `;
  }

  // Atendimentos do dia
  let aptList = '';
  if (appts.length === 0) {
    aptList = `<div class="empty-state" style="padding:24px"><div class="empty-icon">📅</div><div class="empty-title">Sem atendimentos hoje</div></div>`;
  } else {
    aptList = appts.sort((a,b) => a.time.localeCompare(b.time)).map(a => {
      const c = clients.find(x => x.id === a.clientId);
      return `
        <div class="wait-item" style="margin-bottom:8px;">
          <div class="slot-time" style="width:48px;min-width:48px;background:linear-gradient(160deg,var(--cream),var(--nude));border-radius:var(--radius-sm);font-size:13px;font-weight:700;color:var(--rose-gold);display:flex;align-items:center;justify-content:center;">${a.time}</div>
          <div class="wait-info">
            <div class="wait-name">${Utils.escHtml(c ? c.name : '—')}</div>
            <div class="wait-detail">${c ? Utils.escHtml(c.whatsapp) : ''}</div>
          </div>
          ${WhatsAppService.renderBadge(a.waStatus || 'pending')}
        </div>
      `;
    }).join('');
  }

/* =====================================================
   RENDER AGENDA
===================================================== */
function renderAgenda() {
  return `
    <div class="section-header">
      <div>
        <div class="section-title">Agenda</div>
        <div class="section-subtitle">Gerenciamento de horários</div>
      </div>
      <button class="btn btn-primary" onclick="openNewApptModal()">+ Novo Agendamento</button>
    </div>

    <div class="view-tabs">
      <button class="view-tab ${State.agendaView==='daily'?'active':''}" onclick="switchView('daily')">Diária</button>
      <button class="view-tab ${State.agendaView==='weekly'?'active':''}" onclick="switchView('weekly')">Semanal</button>
      <button class="view-tab ${State.agendaView==='monthly'?'active':''}" onclick="switchView('monthly')">Mensal</button>
    </div>

    <div id="agendaViewContainer">
      ${renderAgendaView()}
    </div>
  `;
}

function bindAgendaEvents() {}

function switchView(view) {
  State.agendaView = view;
  document.querySelectorAll('.view-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim().toLowerCase().startsWith(view === 'daily' ? 'diária' : view === 'weekly' ? 'semanal' : 'mensal'));
  });
  document.getElementById('agendaViewContainer').innerHTML = renderAgendaView();
}

function renderAgendaView() {
  switch (State.agendaView) {
    case 'daily':   return renderDailyView();
    case 'weekly':  return renderWeeklyView();
    case 'monthly': return renderMonthlyView();
  }
  return '';
}

/* ---- DAILY ---- */
function renderDailyView() {
  const dateStr = Utils.toDateStr(State.currentDate);
  const today   = Utils.todayStr();
  const clients = Storage.getClients();

  const slots = Utils.TIME_SLOTS.map(time => {
    const blocked  = Agenda.isSlotBlocked(dateStr, time);
    const block    = blocked ? Agenda.getBlockForSlot(dateStr, time) : null;
    const appt     = Storage.getAppointments().find(a => a.date === dateStr && a.time === time && !a.cancelled);
    const client   = appt ? clients.find(c => c.id === appt.clientId) : null;

    if (blocked) {
      return `
        <div class="time-slot slot-blocked">
          <div class="slot-time">${time}</div>
          <div class="slot-content">
            <div>
              <div class="slot-blocked-label">🔒 Horário bloqueado</div>
              <div class="slot-blocked-reason">${Utils.escHtml(block ? (block.reason || '') : '')}</div>
            </div>
          </div>
        </div>`;
    }

    if (appt) {
      return `
        <div class="time-slot">
          <div class="slot-time">${time}</div>
          <div class="slot-content">
            <div>
              <div class="slot-client-name">${Utils.escHtml(client ? client.name : 'Cliente')}</div>
              <div class="slot-client-info">📱 ${Utils.escHtml(client ? client.whatsapp : '')} · ${WhatsAppService.renderBadge(appt.waStatus || 'pending')}</div>
              ${appt.obs ? `<div class="slot-client-info">📝 ${Utils.escHtml(appt.obs)}</div>` : ''}
            </div>
            <div class="slot-actions">
              <button class="btn btn-sm btn-secondary" onclick="openEditApptModal('${appt.id}')">✏️</button>
              <button class="btn btn-sm btn-ghost" onclick="scheduleWA('${appt.id}')">📱</button>
              <button class="btn btn-sm btn-danger" onclick="cancelAppt('${appt.id}')">✕</button>
            </div>
          </div>
        </div>`;
    }

    return `
      <div class="time-slot slot-free">
        <div class="slot-time">${time}</div>
        <div class="slot-content">
          <div class="slot-free-label">Horário disponível</div>
          <div class="slot-actions">
            <button class="btn btn-sm btn-primary" onclick="openNewApptModal('${dateStr}','${time}')">Agendar</button>
            <button class="btn btn-sm btn-ghost" onclick="addToWaitlist('${dateStr}','${time}')">Encaixe</button>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="daily-header">
      <div class="day-nav">
        <button class="day-nav-btn" onclick="navDay(-1)">‹</button>
        <div class="day-label">${Utils.fmtDateLong(dateStr)}</div>
        <button class="day-nav-btn" onclick="navDay(1)">›</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        ${dateStr !== today ? `<button class="btn btn-ghost btn-sm" onclick="goToday()">Hoje</button>` : ''}
        <input type="date" class="input" style="width:160px;font-size:13px;" value="${dateStr}" onchange="goDate(this.value)">
      </div>
    </div>
    <div class="time-slots-list">${slots}</div>
  `;
}

function navDay(n) {
  State.currentDate = Utils.addDays(State.currentDate, n);
  document.getElementById('agendaViewContainer').innerHTML = renderDailyView();
}

function goToday() {
  State.currentDate = new Date();
  document.getElementById('agendaViewContainer').innerHTML = renderDailyView();
}

function goDate(val) {
  if (!val) return;
  State.currentDate = new Date(val + 'T00:00:00');
  document.getElementById('agendaViewContainer').innerHTML = renderDailyView();
}

/* ---- WEEKLY ---- */
function renderWeeklyView() {
  const mon = Utils.startOfWeek(State.weekDate);
  const days = Array.from({length:7}, (_,i) => Utils.addDays(mon, i));
  const today = Utils.todayStr();

  const headers = days.map((d,i) => {
    const ds = Utils.toDateStr(d);
    const isToday = ds === today;
    return `<div class="wg-header${isToday?' today':''}">
      <div class="wg-day">${Utils.WEEK_DAYS_SHORT[d.getDay()]}</div>
      <div class="wg-date">${d.getDate()}</div>
    </div>`;
  }).join('');

  const rows = Utils.TIME_SLOTS.map(time => {
    const cells = days.map(d => {
      const ds = Utils.toDateStr(d);
      const isToday = ds === today;
      const blocked = Agenda.isSlotBlocked(ds, time);
      const appt = Storage.getAppointments().find(a => a.date === ds && a.time === time && !a.cancelled);
      const clients = Storage.getClients();
      const client = appt ? clients.find(c => c.id === appt.clientId) : null;

      if (blocked) return `<div class="wg-cell blocked"><div class="wg-block">🔒 Bloqueado</div></div>`;
      if (appt) return `<div class="wg-cell occupied"><div class="wg-appt" title="${client ? client.name : ''}">${Utils.escHtml(client ? client.name.split(' ')[0] : '—')}</div></div>`;
      return `<div class="wg-cell${isToday?' today-col':''}" onclick="openNewApptModal('${ds}','${time}')"></div>`;
    }).join('');
    return `<div class="wg-time-cell">${time}</div>${cells}`;
  }).join('');

  // Range label
  const rangeLabel = `${days[0].getDate()}/${days[0].getMonth()+1} – ${days[6].getDate()}/${days[6].getMonth()+1}/${days[6].getFullYear()}`;

  return `
    <div class="daily-header">
      <div class="day-nav">
        <button class="day-nav-btn" onclick="navWeek(-1)">‹</button>
        <div class="day-label">${rangeLabel}</div>
        <button class="day-nav-btn" onclick="navWeek(1)">›</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="goWeekToday()">Esta semana</button>
    </div>
    <div class="weekly-wrapper">
      <div class="weekly-grid" style="grid-template-columns:60px repeat(7,1fr);">
        <div class="wg-time-header">H</div>
        ${headers}
        ${rows}
      </div>
    </div>
  `;
}

function navWeek(n) {
  State.weekDate = Utils.addDays(State.weekDate, n * 7);
  document.getElementById('agendaViewContainer').innerHTML = renderWeeklyView();
}

function goWeekToday() {
  State.weekDate = new Date();
  document.getElementById('agendaViewContainer').innerHTML = renderWeeklyView();
}

/* ---- MONTHLY ---- */
function renderMonthlyView() {
  const d = State.monthDate;
  const year = d.getFullYear();
  const month = d.getMonth();
  const today = Utils.todayStr();

  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);
  let startDow = firstDay.getDay(); // 0=dom
  // Adjust to monday start
  startDow = (startDow === 0) ? 6 : startDow - 1;

  const cells = [];
  // Previous month days
  for (let i = startDow - 1; i >= 0; i--) {
    const pd = new Date(year, month, -i);
    cells.push({ date: Utils.toDateStr(pd), other: true });
  }
  // Current month
  for (let i = 1; i <= lastDay.getDate(); i++) {
    cells.push({ date: Utils.toDateStr(new Date(year, month, i)), other: false });
  }
  // Next month to fill grid
  while (cells.length % 7 !== 0) {
    const nd = new Date(year, month + 1, cells.length - lastDay.getDate() - startDow + 1);
    cells.push({ date: Utils.toDateStr(nd), other: true });
  }

  const dayHeaders = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom']
    .map(d => `<div class="mg-day-header">${d}</div>`).join('');

  const cellsHtml = cells.map(({date, other}) => {
    const appts  = Agenda.getForDate(date);
    const blocked= Storage.getBlocks().some(b =>
      (b.fullDay && b.date === date) ||
      (b.dateStart && date >= b.dateStart && date <= b.dateEnd)
    );
    const dayNum = new Date(date + 'T00:00:00').getDate();
    const isToday = date === today;

    const dots = appts.map(() => `<span class="mg-dot"></span>`).join('') +
                 (blocked ? `<span class="mg-dot blocked"></span>` : '');

    return `
      <div class="mg-cell${other?' other-month':''}${isToday?' today':''}" onclick="goToDayView('${date}')">
        <div class="mg-day-num">${dayNum}</div>
        <div>${dots}</div>
      </div>`;
  }).join('');

  return `
    <div class="daily-header">
      <div class="day-nav">
        <button class="day-nav-btn" onclick="navMonth(-1)">‹</button>
        <div class="day-label">${Utils.MONTHS[month]} ${year}</div>
        <button class="day-nav-btn" onclick="navMonth(1)">›</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="goMonthToday()">Este mês</button>
    </div>
    <div class="monthly-grid">
      ${dayHeaders}
      ${cellsHtml}
    </div>
    <div style="margin-top:14px;display:flex;gap:16px;font-size:12px;color:var(--text-light);">
      <span><span class="mg-dot" style="display:inline-block;vertical-align:middle;margin-right:4px;"></span>Agendado</span>
      <span><span class="mg-dot blocked" style="display:inline-block;vertical-align:middle;margin-right:4px;"></span>Bloqueado</span>
    </div>
  `;
}

function navMonth(n) {
  const d = State.monthDate;
  State.monthDate = new Date(d.getFullYear(), d.getMonth() + n, 1);
  document.getElementById('agendaViewContainer').innerHTML = renderMonthlyView();
}

function goMonthToday() {
  State.monthDate = new Date();
  document.getElementById('agendaViewContainer').innerHTML = renderMonthlyView();
}

function goToDayView(dateStr) {
  State.agendaView = 'daily';
  State.currentDate = new Date(dateStr + 'T00:00:00');
  renderPage('agenda');
}

  const timeOptions = Utils.TIME_SLOTS.map(t =>

  ).join('');

  return `

      <label class="form-label">Cliente *</label>
      <select class="input" id="appt-client" required>
        <option value="">Selecione o cliente...</option>

      <div class="form-group">
        <label class="form-label">Data *</label>
        <input type="date" class="input" id="appt-date" value="${appt ? appt.date : (prefDate || Utils.todayStr())}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Horário *</label>
        <select class="input" id="appt-time">${timeOptions}</select>

      <textarea class="input" id="appt-obs" placeholder="Procedimento, observações...">${appt ? Utils.escHtml(appt.obs || '') : ''}</textarea>
    </div>

}

function openNewApptModal(prefDate, prefTime) {
  if (Storage.getClients().length === 0) {
    Toast.warning('Sem clientes cadastrados', 'Cadastre um cliente primeiro.');
    navigate('clientes');
    return;
  }
  const html = `
    <div class="modal-header">
      <div class="modal-title">✦ Novo Agendamento</div>
      <button class="modal-close" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-body">
      ${buildApptForm(prefDate, prefTime, null)}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAppt(null)">Confirmar Agendamento</button>
    </div>
  `;
  Modal.open(html);
}

function openEditApptModal(id) {
  const appt = Storage.getAppointments().find(a => a.id === id);
  if (!appt) return;
  const html = `
    <div class="modal-header">
      <div class="modal-title">✏️ Editar Agendamento</div>
      <button class="modal-close" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-body">
      ${buildApptForm(null, null, appt)}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAppt('${id}')">Salvar</button>
    </div>
  `;
  Modal.open(html);
}

function saveAppt(id) {
  const clientId = document.getElementById('appt-client').value;
  const date     = document.getElementById('appt-date').value;
  const time     = document.getElementById('appt-time').value;
  const obs      = document.getElementById('appt-obs').value.trim();

  if (!clientId) { Toast.error('Campo obrigatório', 'Selecione um cliente.'); return; }
  if (!date)     { Toast.error('Campo obrigatório', 'Informe a data.'); return; }

  // Check conflict
  if (Agenda.isSlotOccupied(date, time, id)) {
    Toast.error('Horário ocupado', 'Já existe um atendimento nesse horário. Use o encaixe.');
    return;
  }
  if (Agenda.isSlotBlocked(date, time)) {
    Toast.error('Horário bloqueado', 'Este horário está bloqueado na agenda.');
    return;
  }

  const appointments = Storage.getAppointments();

  if (id) {
    const idx = appointments.findIndex(a => a.id === id);
    if (idx !== -1) {
      appointments[idx] = { ...appointments[idx], clientId, date, time, obs };
      Storage.setAppointments(appointments);
      Toast.success('Agendamento atualizado!', `${date} às ${time}`);
    }
  } else {
    const newAppt = { id: Utils.uid(), clientId, date, time, obs, cancelled: false, waStatus: 'pending', createdAt: new Date().toISOString() };
    appointments.push(newAppt);
    Storage.setAppointments(appointments);
    // Auto schedule reminder
    WhatsAppService.scheduleReminder(newAppt, Storage.getClients().find(c => c.id === clientId));
    Toast.success('Agendamento criado!', `${date} às ${time}`);
  }

  Modal.close();
  if (State.currentPage === 'agenda') {
    document.getElementById('agendaViewContainer').innerHTML = renderAgendaView();
  } else {
    renderPage(State.currentPage);
  }
}

function cancelAppt(id) {
  Modal.confirm('Cancelar agendamento', 'Deseja cancelar este atendimento? O cliente será removido do horário.', () => {
    const appointments = Storage.getAppointments();
    const idx = appointments.findIndex(a => a.id === id);
    if (idx !== -1) {
      appointments[idx].cancelled = true;
      Storage.setAppointments(appointments);
      Toast.success('Agendamento cancelado!');
      if (State.currentPage === 'agenda') {
        document.getElementById('agendaViewContainer').innerHTML = renderAgendaView();
      } else {
        renderPage(State.currentPage);
      }
    }
  });
}

function scheduleWA(apptId) {
  const appointments = Storage.getAppointments();
  const appt = appointments.find(a => a.id === apptId);
  const client = appt ? Storage.getClients().find(c => c.id === appt.clientId) : null;
  if (!appt || !client) return;
  WhatsAppService.scheduleReminder(appt, client);
  Toast.success('Lembrete programado!', `WhatsApp será enviado 30min antes.`);
  if (State.currentPage === 'agenda') {
    document.getElementById('agendaViewContainer').innerHTML = renderAgendaView();
  }
}

      </div>

        <span class="input-icon">📱</span>

      </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <table class="data-table" id="clientsTable">
        <thead>
          <tr>
            <th>Nome</th>

        <tbody id="clientsTbody">${rows}</tbody>

function filterClients() {
  const name = document.getElementById('searchName').value.toLowerCase();
  const wa   = document.getElementById('searchWA').value.toLowerCase();
  const clients = Storage.getClients().filter(c =>
    (!name || c.name.toLowerCase().includes(name)) &&
    (!wa   || c.whatsapp.toLowerCase().includes(wa))
  );
  const appointments = Storage.getAppointments();
  document.getElementById('clientsTbody').innerHTML = clients.length === 0
    ? `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Nenhum resultado</div></div></td></tr>`
    : clients.map(c => {
        const total = appointments.filter(a => a.clientId === c.id && !a.cancelled).length;
        const next  = appointments
          .filter(a => a.clientId === c.id && !a.cancelled && a.date >= Utils.todayStr())
          .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time))[0];
        return `
          <tr>
            <td><strong>${Utils.escHtml(c.name)}</strong></td>
            <td>📱 ${Utils.escHtml(c.whatsapp)}</td>
            <td><span class="badge badge-rose">${total} atendimentos</span></td>
            <td>${next ? `<span class="badge badge-gold">${Utils.fmtDate(next.date)} ${next.time}</span>` : '<span class="badge badge-gray">–</span>'}</td>
            <td>
              <div style="display:flex;gap:6px;">
                <button class="btn btn-sm btn-secondary" onclick="openEditClientModal('${c.id}')">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="deleteClient('${c.id}')">🗑️</button>
              </div>
            </td>
          </tr>`;
      }).join('');
}

function openEditClientModal(id) {
  const c = Storage.getClients().find(x => x.id === id);
  if (!c) return;
  const html = `
    <div class="modal-header">
      <div class="modal-title">✏️ Editar Cliente</div>
      <button class="modal-close" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome completo *</label>
        <input type="text" class="input" id="cli-name" value="${Utils.escHtml(c.name)}">
      </div>
      <div class="form-group">
        <label class="form-label">WhatsApp *</label>
        <input type="tel" class="input" id="cli-wa" value="${Utils.escHtml(c.whatsapp)}">
      </div>
      <div class="form-group">
        <label class="form-label">Observações</label>
        <textarea class="input" id="cli-obs">${Utils.escHtml(c.obs || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient('${id}')">Salvar</button>
    </div>
  `;
  Modal.open(html);
}

function saveClient(id) {
  const name = document.getElementById('cli-name').value.trim();
  const wa   = document.getElementById('cli-wa').value.trim();
  const obs  = document.getElementById('cli-obs').value.trim();

  if (!name) { Toast.error('Campo obrigatório', 'Informe o nome do cliente.'); return; }
  if (!wa)   { Toast.error('Campo obrigatório', 'Informe o WhatsApp.'); return; }

  const clients = Storage.getClients();
  if (id) {
    const idx = clients.findIndex(c => c.id === id);
    if (idx !== -1) { clients[idx] = { ...clients[idx], name, whatsapp: wa, obs }; }
    Toast.success('Cliente atualizado!');
  } else {
    clients.push({ id: Utils.uid(), name, whatsapp: wa, obs, createdAt: new Date().toISOString() });
    Toast.success('Cliente cadastrado!', name);
  }
  Storage.setClients(clients);
  Modal.close();
  renderPage('clientes');
}

function deleteClient(id) {
  Modal.confirm('Excluir cliente', 'Todos os agendamentos deste cliente também serão removidos. Continuar?', () => {
    let clients = Storage.getClients().filter(c => c.id !== id);
    let appts   = Storage.getAppointments().filter(a => a.clientId !== id);
    Storage.setClients(clients);
    Storage.setAppointments(appts);
    Toast.success('Cliente excluído.');
    renderPage('clientes');
  });
}

/* =====================================================
   WAITLIST
===================================================== */
function renderEspera() {
  const waitlist = Storage.getWaitlist();

  const items = waitlist.length === 0
    ? `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Lista de espera vazia</div><div class="empty-sub">Nenhum cliente aguardando encaixe</div></div>`
    : waitlist.map((w, i) => `
        <div class="wait-item">
          <div class="wait-pos">${i + 1}</div>
          <div class="wait-info">
            <div class="wait-name">${Utils.escHtml(w.name)}</div>
            <div class="wait-detail">📱 ${Utils.escHtml(w.whatsapp)} · 🗓️ ${Utils.fmtDate(w.date)} às ${w.time}</div>
            ${w.obs ? `<div class="wait-detail">📝 ${Utils.escHtml(w.obs)}</div>` : ''}
          </div>
          <div class="slot-actions">
            <button class="btn btn-sm btn-primary" onclick="convertWaitToAppt('${w.id}')">✅ Converter</button>
            <button class="btn btn-sm btn-danger" onclick="removeFromWait('${w.id}')">✕</button>
          </div>
        </div>
      `).join('');

  return `
    <div class="section-header">
      <div>
        <div class="section-title">Lista de Espera</div>
        <div class="section-subtitle">${waitlist.length} cliente(s) aguardando</div>
      </div>
      <button class="btn btn-primary" onclick="openAddWaitModal()">+ Adicionar à Fila</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">${items}</div>
  `;
}

function addToWaitlist(prefDate, prefTime) {
  openAddWaitModal(prefDate, prefTime);
}

function openAddWaitModal(prefDate, prefTime) {
  const timeOptions = Utils.TIME_SLOTS.map(t =>
    `<option value="${t}" ${prefTime === t ? 'selected' : ''}>${t}</option>`
  ).join('');

  const html = `
    <div class="modal-header">
      <div class="modal-title">⏳ Adicionar à Lista de Espera</div>
      <button class="modal-close" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nome completo *</label>
        <input type="text" class="input" id="w-name" placeholder="Nome da cliente...">
      </div>
      <div class="form-group">
        <label class="form-label">WhatsApp *</label>
        <input type="tel" class="input" id="w-wa" placeholder="(11) 99999-9999">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data desejada *</label>
          <input type="date" class="input" id="w-date" value="${prefDate || Utils.todayStr()}">
        </div>
        <div class="form-group">
          <label class="form-label">Horário desejado</label>
          <select class="input" id="w-time">${timeOptions}</select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Observações</label>
        <textarea class="input" id="w-obs" placeholder="Procedimento, preferências..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveWaitItem()">Adicionar à Fila</button>
    </div>
  `;
  Modal.open(html);
}

function saveWaitItem() {
  const name = document.getElementById('w-name').value.trim();
  const wa   = document.getElementById('w-wa').value.trim();
  const date = document.getElementById('w-date').value;
  const time = document.getElementById('w-time').value;
  const obs  = document.getElementById('w-obs').value.trim();

  if (!name) { Toast.error('Campo obrigatório', 'Informe o nome.'); return; }
  if (!wa)   { Toast.error('Campo obrigatório', 'Informe o WhatsApp.'); return; }
  if (!date) { Toast.error('Campo obrigatório', 'Informe a data.'); return; }

  const waitlist = Storage.getWaitlist();
  waitlist.push({ id: Utils.uid(), name, whatsapp: wa, date, time, obs, createdAt: new Date().toISOString() });
  Storage.setWaitlist(waitlist);
  Toast.success('Adicionado à lista de espera!', name);
  Modal.close();
  if (State.currentPage === 'espera') renderPage('espera');
  else updateWaitBadge();
}

function removeFromWait(id) {
  Modal.confirm('Remover da fila', 'Deseja remover este cliente da lista de espera?', () => {
    Storage.setWaitlist(Storage.getWaitlist().filter(w => w.id !== id));
    Toast.success('Removido da lista de espera.');
    renderPage('espera');
  });
}

function convertWaitToAppt(id) {
  const w = Storage.getWaitlist().find(x => x.id === id);
  if (!w) return;

  // Verifica conflito
  if (Agenda.isSlotOccupied(w.date, w.time)) {
    Toast.error('Horário ocupado', 'O horário desejado ainda está ocupado. Edite antes de converter.');
    return;
  }
  if (Agenda.isSlotBlocked(w.date, w.time)) {
    Toast.error('Horário bloqueado', 'O horário desejado está bloqueado.');
    return;
  }

  // Cria cliente se não existir
  let clients = Storage.getClients();
  let client = clients.find(c => c.whatsapp === w.whatsapp);
  if (!client) {
    client = { id: Utils.uid(), name: w.name, whatsapp: w.whatsapp, obs: w.obs, createdAt: new Date().toISOString() };
    clients.push(client);
    Storage.setClients(clients);
  }

  // Cria agendamento
  const appts = Storage.getAppointments();
  const newAppt = { id: Utils.uid(), clientId: client.id, date: w.date, time: w.time, obs: w.obs, cancelled: false, waStatus: 'scheduled', createdAt: new Date().toISOString() };
  appts.push(newAppt);
  Storage.setAppointments(appts);

  // Remove da fila
  Storage.setWaitlist(Storage.getWaitlist().filter(x => x.id !== id));
  Toast.success('Convertido para agendamento!', `${w.name} · ${Utils.fmtDate(w.date)} às ${w.time}`);
  renderPage('espera');
}

/* =====================================================
   BLOCKS / BLOQUEIOS
===================================================== */
function renderBloqueios() {
  const blocks = Storage.getBlocks();

  const items = blocks.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-title">Sem bloqueios cadastrados</div><div class="empty-sub">Use bloqueios para férias, eventos e ausências</div></div>`
    : blocks.map(b => {
        let detail = '';
        if (b.fullDay && b.dateStart && b.dateEnd) {
          detail = `Período: ${Utils.fmtDate(b.dateStart)} até ${Utils.fmtDate(b.dateEnd)} · Dia inteiro`;
        } else if (b.fullDay) {
          detail = `${Utils.fmtDate(b.date)} · Dia inteiro`;
        } else {
          detail = `${Utils.fmtDate(b.date)} às ${b.time}`;
        }
        return `
          <div class="block-item">
            <div>
              <div class="block-title">🔒 ${Utils.escHtml(b.reason || 'Bloqueio')}</div>
              <div class="block-detail">${detail}</div>
            </div>
            <div class="slot-actions">
              <button class="btn btn-sm btn-secondary" onclick="openEditBlockModal('${b.id}')">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteBlock('${b.id}')">🗑️</button>
            </div>
          </div>`;
      }).join('');

  return `
    <div class="section-header">
      <div>
        <div class="section-title">Bloqueios de Agenda</div>
        <div class="section-subtitle">${blocks.length} bloqueio(s) cadastrado(s)</div>
      </div>
      <button class="btn btn-primary" onclick="openBlockModal(null)">+ Novo Bloqueio</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">${items}</div>
  `;
}

function buildBlockForm(b) {
  const timeOptions = Utils.TIME_SLOTS.map(t =>
    `<option value="${t}" ${b && b.time === t ? 'selected' : ''}>${t}</option>`
  ).join('');

  const typeVal = b ? (b.dateStart ? 'period' : b.fullDay ? 'fullday' : 'slot') : 'slot';

  return `
    <div class="form-group">
      <label class="form-label">Tipo de bloqueio</label>
      <select class="input" id="blk-type" onchange="toggleBlockFields()">
        <option value="slot"    ${typeVal==='slot'    ? 'selected' : ''}>Horário específico</option>
        <option value="fullday" ${typeVal==='fullday' ? 'selected' : ''}>Dia inteiro</option>
        <option value="period"  ${typeVal==='period'  ? 'selected' : ''}>Período (vários dias)</option>
      </select>
    </div>
    <div id="blk-slot-fields" style="${typeVal !== 'slot' ? 'display:none' : ''}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" class="input" id="blk-date" value="${b && !b.dateStart ? (b.date || Utils.todayStr()) : Utils.todayStr()}">
        </div>
        <div class="form-group">
          <label class="form-label">Horário</label>
          <select class="input" id="blk-time">${timeOptions}</select>
        </div>
      </div>
    </div>
    <div id="blk-fullday-fields" style="${typeVal !== 'fullday' ? 'display:none' : ''}">
      <div class="form-group">
        <label class="form-label">Data</label>
        <input type="date" class="input" id="blk-fdate" value="${b && b.fullDay && !b.dateStart ? (b.date || Utils.todayStr()) : Utils.todayStr()}">
      </div>
    </div>
    <div id="blk-period-fields" style="${typeVal !== 'period' ? 'display:none' : ''}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Data início</label>
          <input type="date" class="input" id="blk-start" value="${b && b.dateStart ? b.dateStart : Utils.todayStr()}">
        </div>
        <div class="form-group">
          <label class="form-label">Data fim</label>
          <input type="date" class="input" id="blk-end" value="${b && b.dateEnd ? b.dateEnd : Utils.todayStr()}">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Motivo</label>
      <input type="text" class="input" id="blk-reason" placeholder="Ex: Férias, Evento, Curso..." value="${b ? Utils.escHtml(b.reason || '') : ''}">
    </div>
  `;
}

function toggleBlockFields() {
  const t = document.getElementById('blk-type').value;
  document.getElementById('blk-slot-fields').style.display    = t === 'slot'    ? '' : 'none';
  document.getElementById('blk-fullday-fields').style.display  = t === 'fullday' ? '' : 'none';
  document.getElementById('blk-period-fields').style.display   = t === 'period'  ? '' : 'none';
}

function openBlockModal(id) {
  const b = id ? Storage.getBlocks().find(x => x.id === id) : null;
  const html = `
    <div class="modal-header">
      <div class="modal-title">${b ? '✏️ Editar Bloqueio' : '🔒 Novo Bloqueio'}</div>
      <button class="modal-close" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-body">${buildBlockForm(b)}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveBlock('${id || ''}')">Salvar Bloqueio</button>
    </div>
  `;
  Modal.open(html);
}

function openEditBlockModal(id) { openBlockModal(id); }

function saveBlock(id) {
  const type   = document.getElementById('blk-type').value;
  const reason = document.getElementById('blk-reason').value.trim();
  let block = { id: id || Utils.uid(), reason };

  if (type === 'slot') {
    const date = document.getElementById('blk-date').value;
    const time = document.getElementById('blk-time').value;
    if (!date) { Toast.error('Campo obrigatório', 'Informe a data.'); return; }
    block = { ...block, date, time, fullDay: false };
  } else if (type === 'fullday') {
    const date = document.getElementById('blk-fdate').value;
    if (!date) { Toast.error('Campo obrigatório', 'Informe a data.'); return; }
    block = { ...block, date, fullDay: true };
  } else {
    const start = document.getElementById('blk-start').value;
    const end   = document.getElementById('blk-end').value;
    if (!start || !end) { Toast.error('Campo obrigatório', 'Informe o período.'); return; }
    if (end < start) { Toast.error('Datas inválidas', 'A data fim deve ser após a data início.'); return; }
    block = { ...block, dateStart: start, dateEnd: end, fullDay: true };
  }

  let blocks = Storage.getBlocks();
  if (id) {
    const idx = blocks.findIndex(b => b.id === id);
    if (idx !== -1) blocks[idx] = block;
    Toast.success('Bloqueio atualizado!');
  } else {
    blocks.push(block);
    Toast.success('Bloqueio criado!');
  }
  Storage.setBlocks(blocks);
  Modal.close();
  renderPage('bloqueios');
}

function deleteBlock(id) {
  Modal.confirm('Remover bloqueio', 'Deseja remover este bloqueio da agenda?', () => {
    Storage.setBlocks(Storage.getBlocks().filter(b => b.id !== id));
    Toast.success('Bloqueio removido.');
    renderPage('bloqueios');
  });
}
